name: Post new cartoons to Discussions

on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  discussions: write
  contents: write

jobs:
  post-cartoons:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch RSS and post new cartoons
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const https = require('https');

            // ── helpers ──────────────────────────────────────────────────────
            function httpsGet(url) {
              return new Promise((resolve, reject) => {
                https.get(url, res => {
                  let data = '';
                  res.on('data', chunk => data += chunk);
                  res.on('end', () => resolve(data));
                  res.on('error', reject);
                });
              });
            }

            function parseItems(xml) {
              const items = [];
              const itemRx = /<item>([\s\S]*?)<\/item>/g;
              let match;
              while ((match = itemRx.exec(xml)) !== null) {
                const block = match[1];
                const get = tag => {
                  const m = block.match(new RegExp(`<${tag}[^>]*>(?:<!\\[CDATA\\[)?([\\s\\S]*?)(?:\\]\\]>)?<\\/${tag}>`, 'i'));
                  return m ? m[1].trim() : '';
                };
                const encMatch = block.match(/enclosure[^>]+url="([^"]+)"/i);
                items.push({
                  title:       get('title'),
                  description: get('description'),
                  link:        get('link'),
                  guid:        get('guid'),
                  pubDate:     get('pubDate'),
                  category:    get('category'),
                  imageUrl:    encMatch ? encMatch[1] : '',
                });
              }
              return items;
            }

            // ── load seen GUIDs ───────────────────────────────────────────────
            const seenPath = '.github/seen-cartoon-guids.json';
            let seen = new Set();
            if (fs.existsSync(seenPath)) {
              seen = new Set(JSON.parse(fs.readFileSync(seenPath, 'utf8')));
            }

            // ── fetch RSS ─────────────────────────────────────────────────────
            const xml = await httpsGet('https://agentweekly.ai/rss.xml');
            const items = parseItems(xml);
            const cartoons = items.filter(i => i.category === 'Cartoons');
            console.log(`Found ${cartoons.length} cartoons in feed`);

            // ── find the Discussions category ID for "Cartoons" ───────────────
            const catQuery = `
              query($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) {
                  discussionCategories(first: 20) {
                    nodes { id name }
                  }
                }
              }`;
            const catResult = await github.graphql(catQuery, {
              owner: context.repo.owner,
              repo:  context.repo.repo,
            });
            const categories = catResult.repository.discussionCategories.nodes;
            const cartoonCat = categories.find(c => c.name === 'Cartoons');
            if (!cartoonCat) {
              core.setFailed('No "Cartoons" discussion category found. Create it in the repo settings first.');
              return;
            }

            // ── get repo node ID ──────────────────────────────────────────────
            const repoQuery = `
              query($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) { id }
              }`;
            const repoResult = await github.graphql(repoQuery, {
              owner: context.repo.owner,
              repo:  context.repo.repo,
            });
            const repoId = repoResult.repository.id;

            // ── post new cartoons ─────────────────────────────────────────────
            let posted = 0;
            for (const cartoon of cartoons) {
              if (seen.has(cartoon.guid)) continue;

              const body = [
                cartoon.imageUrl ? `![${cartoon.title}](${cartoon.imageUrl})` : '',
                '',
                `> ${cartoon.description}`,
                '',
                `[View on Agent Weekly](${cartoon.link})`,
              ].filter((l, i, arr) => !(l === '' && arr[i - 1] === '')).join('\n');

              await github.graphql(`
                mutation($repoId: ID!, $categoryId: ID!, $title: String!, $body: String!) {
                  createDiscussion(input: {
                    repositoryId: $repoId
                    categoryId: $categoryId
                    title: $title
                    body: $body
                  }) {
                    discussion { url }
                  }
                }`, {
                  repoId,
                  categoryId: cartoonCat.id,
                  title: cartoon.title,
                  body,
                });

              console.log(`Posted: ${cartoon.title}`);
              seen.add(cartoon.guid);
              posted++;
            }

            console.log(`Posted ${posted} new cartoon(s)`);

            // ── persist seen GUIDs ────────────────────────────────────────────
            fs.writeFileSync(seenPath, JSON.stringify([...seen], null, 2));

      - name: Commit updated seen-guids
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/seen-cartoon-guids.json
          git diff --cached --quiet || git commit -m "chore: update seen cartoon GUIDs [skip ci]"
          git push
