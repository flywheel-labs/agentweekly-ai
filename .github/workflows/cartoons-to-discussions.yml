name: Post new content to Discussions

on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  discussions: write
  contents: write

jobs:
  post-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch RSS and post new content
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const https = require('https');

            // ── helpers ──────────────────────────────────────────────────────
            function httpsGet(url) {
              return new Promise((resolve, reject) => {
                https.get(url, res => {
                  let data = '';
                  res.on('data', chunk => data += chunk);
                  res.on('end', () => resolve(data));
                  res.on('error', reject);
                });
              });
            }

            function parseItems(xml) {
              const items = [];
              const itemRx = /<item>([\s\S]*?)<\/item>/g;
              let match;
              while ((match = itemRx.exec(xml)) !== null) {
                const block = match[1];
                const get = tag => {
                  const m = block.match(new RegExp(`<${tag}[^>]*>(?:<!\\[CDATA\\[)?([\\s\\S]*?)(?:\\]\\]>)?<\\/${tag}>`, 'i'));
                  return m ? m[1].trim() : '';
                };
                const encMatch = block.match(/enclosure[^>]+url="([^"]+)"/i);
                items.push({
                  title:       get('title'),
                  description: get('description'),
                  link:        get('link'),
                  guid:        get('guid'),
                  pubDate:     get('pubDate'),
                  category:    get('category'),
                  source:      get('source'),
                  imageUrl:    encMatch ? encMatch[1] : '',
                });
              }
              return items;
            }

            // ── load seen GUIDs ───────────────────────────────────────────────
            const seenPath = '.github/seen-cartoon-guids.json';
            let seen = new Set();
            if (fs.existsSync(seenPath)) {
              seen = new Set(JSON.parse(fs.readFileSync(seenPath, 'utf8')));
            }

            // ── fetch RSS ─────────────────────────────────────────────────────
            const xml = await httpsGet('https://agentweekly.ai/rss.xml');
            const items = parseItems(xml);
            const cartoons = items.filter(i => i.category === 'Cartoons');
            const articles = items.filter(i => i.category === 'Articles');
            console.log(`Found ${cartoons.length} cartoons, ${articles.length} articles`);

            // ── get category IDs and repo ID ──────────────────────────────────
            const metaResult = await github.graphql(`
              query($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) {
                  id
                  discussionCategories(first: 20) {
                    nodes { id name }
                  }
                }
              }`, { owner: context.repo.owner, repo: context.repo.repo });

            const repoId = metaResult.repository.id;
            const categories = metaResult.repository.discussionCategories.nodes;
            const cartoonCat = categories.find(c => c.name === 'Cartoons');
            const newsCat    = categories.find(c => c.name === 'News');

            if (!cartoonCat) { core.setFailed('No "Cartoons" discussion category found.'); return; }
            if (!newsCat)    { core.setFailed('No "News" discussion category found.'); return; }

            // ── helper: create a discussion ───────────────────────────────────
            async function postDiscussion(categoryId, title, body) {
              const result = await github.graphql(`
                mutation($repoId: ID!, $categoryId: ID!, $title: String!, $body: String!) {
                  createDiscussion(input: {
                    repositoryId: $repoId
                    categoryId: $categoryId
                    title: $title
                    body: $body
                  }) {
                    discussion { url }
                  }
                }`, { repoId, categoryId, title, body });
              return result.createDiscussion.discussion.url;
            }

            // ── post new cartoons ─────────────────────────────────────────────
            let postedCartoons = 0;
            for (const cartoon of cartoons) {
              if (seen.has(cartoon.guid)) continue;

              const body = [
                cartoon.imageUrl ? `![${cartoon.title}](${cartoon.imageUrl})` : '',
                '',
                `> ${cartoon.description}`,
                '',
                `[View on Agent Weekly](${cartoon.link})`,
              ].filter((l, i, arr) => !(l === '' && arr[i - 1] === '')).join('\n');

              const url = await postDiscussion(cartoonCat.id, cartoon.title, body);
              console.log(`Cartoon posted: ${cartoon.title} → ${url}`);
              seen.add(cartoon.guid);
              postedCartoons++;
            }

            // ── post new articles ─────────────────────────────────────────────
            let postedArticles = 0;
            for (const article of articles) {
              if (seen.has(article.guid)) continue;

              let body;
              const isOriginal = article.link.startsWith('https://agentweekly.ai/articles/');

              if (isOriginal) {
                // Fetch full Markdown body from the content API
                const mdUrl = article.link.endsWith('.md') ? article.link : article.link + '.md';
                try {
                  const md = await httpsGet(mdUrl);
                  // Strip YAML frontmatter
                  const stripped = md.replace(/^---[\s\S]*?---\n/, '').trim();
                  body = stripped + `\n\n---\n[Read on Agent Weekly](${article.link})`;
                } catch (e) {
                  // Fall back to headline + link if fetch fails
                  body = `${article.description}\n\n[Read on Agent Weekly](${article.link})`;
                }
              } else {
                // Third-party: headline + description + link only — traffic goes to source
                const source = article.source ? ` — *${article.source}*` : '';
                body = `${article.description}${source}\n\n[Read the full article](${article.link})`;
              }

              const url = await postDiscussion(newsCat.id, article.title, body);
              console.log(`Article posted: ${article.title} → ${url}`);
              seen.add(article.guid);
              postedArticles++;
            }

            console.log(`Posted ${postedCartoons} cartoon(s), ${postedArticles} article(s)`);

            // ── persist seen GUIDs ────────────────────────────────────────────
            fs.writeFileSync(seenPath, JSON.stringify([...seen], null, 2));

      - name: Commit updated seen-guids
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/seen-cartoon-guids.json
          git diff --cached --quiet || git commit -m "chore: update seen GUIDs [skip ci]"
          git push
